<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 500px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .container {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      width: 100%;
      height: 500px;
      width: 300px;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .container h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.3rem;
      font-size: 0.9rem;
      color: #555;
    }

    .form-group input {
      width: 100%;
      padding: 0.7rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.3s;
    }

    .form-group input:focus {
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102,126,234,0.5);
    }

    .btn {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #5a67d8;
    }

    .footer {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: bold;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 500px) {
      .container {
        margin: 1rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Create Account</h2>

    <form>
      <div class="form-group">
        <label for="username">Full Name</label>
        <input type="text"  id="username" placeholder="Enter your name"  name="username" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email"  id="email" placeholder="Enter your email" name="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password"  placeholder="Create password" name="password" required>
      </div>

      <div class="form-group">
        <label for="confirmpassword">Confirm Password</label>
        <input type="password" id="confirmpassword" placeholder="Confirm password" name="confirmpassword" required>
      </div>
      <div class="form-group">
        <label for="image">User Image</label>
        <input type="url" id="image" placeholder="Paste img url" name="image" required>
      </div>

      <button type="submit" class="btn">Sign Up</button>
    </form>

    <div class="footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

</body>
<script src="./signup.js"></script>
</html>
