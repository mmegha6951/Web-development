<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        body{
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #fff5f2;
        }

        main{
            height: 200vh;
            width: 100%;
            background: linear-gradient(to bottom, #ffe0dc, #fff5f2);
        }

        section{
            height: 60px;
            width: 100%;
            display: flex;
            align-items: center;
            border: 2px solid rgb(235, 174, 152);
            background: linear-gradient(90deg, #ff6f61, #ff9472);
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #leftpart{
            flex-basis: 20%;
            font-size: 18px;
            font-weight: bold;
            padding-left: 15px;
        }

       #middlepart{
        flex-basis: 65%;
        font-size: small;
        display: flex;
        align-items: center;
        justify-content: space-evenly;
       }

       #middlepart div{
        cursor: pointer;
        transition: all 0.3s ease;
       }

       #middlepart div:hover{
        transform: scale(1.1);
        color: yellow;
       }

       .profile img{
        height: 50px;
        width:50px;
        border: 2px solid;
        border-radius: 50%;
        flex-basis: 15%;
        text-align: center;
        font-size: 20px;
       }

       img{
        height: 150px;
        width: 200px;
        border-radius: 15px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        transition: transform 0.4s ease;
       }

       img:hover{
        transform: scale(1.05);
       }
       #secondmaincontainer{
        height: 200px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 50px;
       }
       #fourthmaincontainer{
        height: 150px;
        width: 100%;
        display: flex;
        align-items: end;
        justify-content: space-around;
        border: 2px solid rgb(235, 174, 152);
        padding: 20px;
        
       }
       footer{
        text-align: center;
        padding: 20px;
        font-style: italic;
        background: #ff6f61;
        color: white;
        border-radius: 10px;
        box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        line-height: 1.6;
       }

       p{
        font-size: 16px;
        text-align: center;
        color: #333;
       }
       #food-items{
        height: 100vh;
        width: 100%;

        display: flex;
        align-items: center;
        justify-content: space-around;
        flex-wrap: wrap;
       }
       #food-cards{
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        flex-direction: column;
        border: 2px solid lightblue;
        border-radius: 10px;
       }
    </style>
</head>
<body>
    <main>
        <section>
        <div id="leftpart">🐼 Panda Food Cart</div>

        <div id="middlepart">
        <div id=""><a href="./HOMEPAGE.html"></a>Home🏠</div>
        <div id=" "><a href="./Food Page.html"></a>Food🍚</div>
        <div id=" "><a href="./Cart.html"></a>Cart🛒</div>
        </div>

        <div class="profile">
            <img id="profile" src="" alt="Pofile photo">
        </div>
        </section>
        <aside id="secondmaincontainer">
                <select name="search" id="search" onchange="applyFilter()">
                    <option value="All">All</option>
                    <option value="Pizza">Pizza</option>
                    <option value="Burger">Burger</option>
                    <option value="Biriyani">Biriyani</option>
                    <option value="Desserts">Desserts</option>
                    <option value="Rolls">Rolls</option>
                    <option value="Drinks">Drinks</option>
                </select>
                <input type="search" id="searchcategory" placeholder="Search Foods ...." onkeyup="applyFilter()">
        </aside>
        <aside id="food-items">
            
        </aside>
        
        </main>
        <aside id="fourthmaincontainer">
            <footer>
                “From craving to checkout, we bring your favorite flavors right to your fingertips.
                Crafted with love, served with convenience — because great food deserves a great experience.”
                <br><br>
                ❤️ Panda Food Cart | Taste the Happiness
            </footer>
        </aside>
</body>
<script src="./Food Page.js"></script>
</html>
